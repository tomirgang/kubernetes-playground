"apiVersion": "kustomize.config.k8s.io/v1beta1"
"kind": "Kustomization"
"patches":
- "patch": |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: system-upgrade-controller
      namespace: system-upgrade
    spec:
      template:
        spec:
          containers:
            - name: system-upgrade-controller
              volumeMounts:
                - name: ca-certificates
                  mountPath: /var/lib/ca-certificates
          volumes:
            - name: ca-certificates
              hostPath:
                path: /var/lib/ca-certificates
                type: Directory
  "target":
    "group": "apps"
    "kind": "Deployment"
    "name": "system-upgrade-controller"
    "namespace": "system-upgrade"
    "version": "v1"
- "path": "kured.yaml"
"resources":
- "https://github.com/kubereboot/kured/releases/download/1.21.0/kured-1.21.0-combined.yaml"
- "https://github.com/rancher/system-upgrade-controller/releases/download/v0.18.0/system-upgrade-controller.yaml"
- "https://github.com/rancher/system-upgrade-controller/releases/download/v0.18.0/crd.yaml"
- "hcloud-ccm-helm.yaml"
- "hcloud-csi.yaml"
- "traefik_ingress.yaml"
- "flannel-rbac.yaml"
- "cert_manager.yaml"
