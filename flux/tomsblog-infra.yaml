apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tomsblog-infra
  namespace: flux-system
spec:
  interval: 10m
  path: ./infra/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: tomsblog
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postgres-cluster
      namespace: postgres
